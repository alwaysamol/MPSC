services:
  - type: web
    name: mpsc-prep
    runtime: docker
    plan: free
    # The Spring Boot app lives in the mpsc-prep subfolder of this repo.
    rootDir: mpsc-prep
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /
    autoDeploy: true
    envVars:
      # MongoDB Atlas connection string — set in Render dashboard Environment tab.
      # Format: mongodb+srv://user:pass@cluster.mongodb.net/mpsc?retryWrites=true&w=majority
      - key: MONGODB_URI
        sync: false
      # Groq API key for AI MCQ generation and AI Search.
      - key: GROK_API_KEY
        sync: false
