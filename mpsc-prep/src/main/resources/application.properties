spring.application.name=mpsc-prep
server.port=8080

# Database name used inside the (embedded) MongoDB
spring.data.mongodb.database=mpsc

# ---------------------------------------------------------------------------
# Embedded MongoDB (Flapdoodle). On first run this downloads a MongoDB binary.
# ---------------------------------------------------------------------------
de.flapdoodle.mongodb.embedded.version=7.0.4

# ---------------------------------------------------------------------------
# To use your OWN MongoDB instead of the embedded one:
#   1. Comment out the line above (de.flapdoodle.mongodb.embedded.version)
#   2. Uncomment the line below and point it at your server
#   3. (Optional) remove the flapdoodle dependency from pom.xml
# spring.data.mongodb.uri=mongodb://localhost:27017/mpsc
# ---------------------------------------------------------------------------

logging.level.org.mongodb.driver=WARN
logging.level.de.flapdoodle=WARN

# ---------------------------------------------------------------------------
# AI API (Groq Cloud)  -- powers AI-generated MCQs and AI Search.
# The key below is a Groq Cloud key (https://console.groq.com). Groq's API is
# OpenAI-compatible. You can override the key with a GROK_API_KEY env variable.
#
# NOTE: keep API keys out of public git repos. Prefer the env variable and
# rotate this key if it ever leaks.
# ---------------------------------------------------------------------------
groq.api.key=${GROQ_API_KEY}
grok.base-url=https://api.groq.com/openai/v1
grok.model=llama-3.3-70b-versatile
# Request timeout in seconds
grok.timeout-seconds=60
