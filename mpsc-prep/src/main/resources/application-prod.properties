# Production profile — active when SPRING_PROFILES_ACTIVE=prod (set in Dockerfile).
# Connects to MongoDB Atlas instead of the embedded MongoDB used locally.
# Set MONGODB_URI in the hosting platform's environment variables dashboard.
spring.data.mongodb.uri=${MONGODB_URI}
# database name is already embedded in the URI path (/mpsc), so we don't
# set spring.data.mongodb.database here to avoid a conflict with the URI.

# Disable the embedded-MongoDB version property so flapdoodle (absent from the
# prod build classpath anyway) does not start.
de.flapdoodle.mongodb.embedded.version=
